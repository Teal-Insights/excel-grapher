default_install_hook_types: [pre-push]
default_stages: [pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true
